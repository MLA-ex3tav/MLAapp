<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versiones | MLA Software</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        'app-green': '#22c55e',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #faf6f2;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            color: #0b0f19;
        }

        .dots-bg {
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 30px 30px;
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .pill-btn {
            border-radius: 9999px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .scroll-reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card-interaction {
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .card-interaction:hover {
            transform: translateY(-8px);
        }
    </style>
</head>

<body>
    <div class="dots-bg"></div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-lg font-bold tracking-tight text-slate-900">MLA Software</a>
            <div class="hidden md:flex gap-8 text-sm font-bold text-slate-500">
                <a href="index.html#descarga" class="hover:text-blue-600 transition-colors">Descarga</a>
                <a href="index.html#funciones" class="hover:text-blue-600 transition-colors">Funciones</a>
                <a href="versiones.html" class="text-blue-600 transition-colors">Versiones</a>
                <a href="index.html#comunidad" class="hover:text-blue-600 transition-colors">Comunidad</a>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="pt-48 pb-20 px-6 text-center">
        <div class="max-w-4xl mx-auto scroll-reveal">
            <span class="text-blue-600 font-bold text-sm tracking-widest uppercase mb-4 block">Historial de Lanzamientos</span>
            <h1 class="text-5xl md:text-6xl font-black text-slate-900 mb-6 tracking-tighter leading-tight">Versiones anteriores.</h1>
            <p class="text-slate-500 text-xl font-medium max-w-2xl mx-auto leading-relaxed">
                Explora el historial de mejoras y descarga versiones previas para mantener la compatibilidad con tu sistema.
            </p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 pb-40">
        <div id="versions-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 scroll-reveal">
            <!-- Versions will be injected here -->
            <div class="col-span-full flex justify-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-20 border-t border-slate-100 bg-white">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8 text-slate-400 font-bold text-[10px] uppercase tracking-widest">
            <span>MLA Software 2026</span>
            <div class="flex gap-8">
                <a href="index.html#descarga" class="hover:text-blue-600">Descarga</a>
                <a href="index.html#funciones" class="hover:text-blue-600">Funciones</a>
                <a href="versiones.html" class="hover:text-blue-600">Versiones</a>
                <a href="index.html#comunidad" class="hover:text-blue-600">Comunidad</a>
            </div>
        </div>
    </footer>

    <script>
        // --- Reveal Logic ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));

        // --- GitHub Sync Logic ---
        const REPO = 'MLA-ex3tav/MLAapp';

        async function fetchAllReleases() {
            const container = document.getElementById('versions-container');
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/releases`);
                if (!response.ok) throw new Error('API Error');

                const releases = await response.json();
                if (releases.length === 0) {
                    container.innerHTML = '<p class="text-slate-400 text-sm col-span-full text-center py-20 font-bold uppercase tracking-widest">No hay versiones disponibles.</p>';
                    return;
                }

                container.innerHTML = releases.map((release, index) => {
                    const exeAsset = release.assets.find(a => a.name.endsWith('.exe'));
                    const downloadUrl = exeAsset ? exeAsset.browser_download_url : release.html_url;
                    const size = exeAsset ? (exeAsset.size / (1024 * 1024)).toFixed(0) + ' MB' : '-';
                    const date = new Date(release.published_at).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
                    const isLatest = index === 0;

                    return `
                    <div class="bg-white border border-slate-100 rounded-[2.5rem] p-8 flex flex-col justify-between hover:shadow-2xl hover:border-blue-100 transition-all duration-500 card-interaction relative group overflow-hidden">
                        ${isLatest ? '<div class="absolute top-0 right-0 bg-blue-600 text-white text-[9px] font-black px-4 py-1 rounded-bl-2xl uppercase tracking-widest">Última</div>' : ''}
                        <div>
                            <div class="flex justify-between items-center mb-6">
                                <span class="px-3 py-1 bg-slate-100 text-slate-900 text-[10px] font-black rounded-full uppercase tracking-widest italic">${release.tag_name}</span>
                                <span class="text-slate-400 text-[10px] font-extrabold uppercase tracking-tighter">${date}</span>
                            </div>
                            <h3 class="text-xl font-black text-slate-900 mb-3 group-hover:text-blue-600 transition-colors">${release.name || release.tag_name}</h3>
                            <div class="text-slate-500 text-sm font-medium mb-8 leading-relaxed line-clamp-4">
                                ${release.body ? release.body.replace(/\r\n/g, '<br>') : 'Mejoras de rendimiento y corrección de errores menores para una mejor experiencia de usuario.'}
                            </div>
                        </div>
                        <div class="flex items-center justify-between border-t border-slate-50 pt-8">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">${size}</span>
                            <a href="${downloadUrl}" class="flex items-center gap-3 bg-slate-950 text-white px-6 py-3 rounded-2xl text-xs font-black hover:bg-blue-600 transition-all shadow-lg shadow-slate-200">
                                <span>Descargar</span>
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            </a>
                        </div>
                    </div>
                    `;
                }).join('');
            } catch (e) {
                console.error(e);
                container.innerHTML = '<p class="text-slate-400 text-sm col-span-full text-center py-20 font-bold uppercase tracking-widest">Error al cargar las versiones. Intente más tarde.</p>';
            }
        }

        fetchAllReleases();
    </script>
</body>

</html>
